<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>WB Land Tools • Mod APK • Auto Captcha</title>
  <!-- Font Awesome 6 for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 30% 20%, #1a1e2b, #0b0d14);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      padding: 1.5rem;
      margin: 0;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(45deg, rgba(255, 215, 0, 0.03) 0px, rgba(255, 215, 0, 0.03) 2px, transparent 2px, transparent 12px);
      pointer-events: none;
    }

    .glass-card {
      max-width: 720px;
      width: 100%;
      background: rgba(18, 22, 33, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 3.5rem;
      padding: 2.8rem 2.2rem;
      box-shadow: 0 40px 70px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 200, 100, 0.25), inset 0 0 30px rgba(255, 180, 30, 0.15);
      border: 1px solid rgba(255, 210, 90, 0.25);
      transition: all 0.3s ease;
      position: relative;
      z-index: 2;
    }

    .premium-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #fbbf24, #d97706);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 2px;
      margin-bottom: 0.8rem;
      text-transform: uppercase;
    }

    .mod-title {
      font-size: 3.2rem;
      font-weight: 800;
      background: linear-gradient(to right, #ffdf6b, #ffb347, #ff8c42);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 0.4rem;
      text-shadow: 0 0 20px rgba(255,180,0,0.6);
      letter-spacing: -0.5px;
    }

    .sub-glow {
      text-align: center;
      color: #cbd5e1;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      font-weight: 500;
      background: rgba(255,255,240,0.05);
      padding: 0.5rem 1.5rem;
      border-radius: 3rem;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,200,100,0.3);
    }

    .feature-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0 2.2rem;
    }

    .feature-chip {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      padding: 0.6rem 1.5rem;
      border-radius: 3rem;
      color: #f1e4b0;
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(251, 191, 36, 0.35);
      box-shadow: 0 8px 18px rgba(0,0,0,0.5);
      transition: background 0.2s;
    }

    .feature-chip i {
      color: #fbbf24;
      font-size: 1rem;
    }

    .captcha-section {
      background: rgba(10, 12, 20, 0.6);
      backdrop-filter: blur(15px);
      border-radius: 2.5rem;
      padding: 1.8rem 1.8rem 1.5rem;
      margin: 1.8rem 0 1.5rem;
      border: 1px solid rgba(255, 200, 60, 0.35);
      box-shadow: 0 20px 35px rgba(0,0,0,0.7), inset 0 0 25px rgba(255,180,0,0.1);
    }

    .captcha-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #ffd966;
      font-weight: 600;
      margin-bottom: 1.3rem;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
    }

    .auto-captcha-badge {
      background: #16a34a;
      color: white;
      padding: 0.35rem 1.2rem;
      border-radius: 3rem;
      font-size: 0.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      box-shadow: 0 0 15px #22c55e;
      animation: pulseGreen 2s infinite;
    }

    @keyframes pulseGreen {
      0% { box-shadow: 0 0 5px #22c55e; }
      50% { box-shadow: 0 0 20px #4ade80, 0 0 8px #16a34a; }
      100% { box-shadow: 0 0 5px #22c55e; }
    }

    .captcha-display {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1322;
      border-radius: 2rem;
      padding: 1rem 1.8rem;
      margin: 1rem 0 1.2rem;
      border: 2px dashed #fbbf24;
      background: linear-gradient(145deg, #1b1f30, #0a0d18);
    }

    .captcha-code {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: 8px;
      background: linear-gradient(180deg, #fde68a, #b45309);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 15px #f59e0b;
      font-family: 'Courier New', monospace;
    }

    .auto-fill-animation {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #a3e635;
      font-weight: 600;
      margin: 0.8rem 0 0.5rem;
    }

    .progress-captcha {
      height: 6px;
      background: #2d3342;
      border-radius: 10px;
      width: 100%;
      margin: 1rem 0 0.8rem;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #fbbf24, #f97316, #ef4444);
      border-radius: 10px;
      transition: width 0.2s ease;
      box-shadow: 0 0 12px #fb923c;
    }

    .download-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 1.8rem;
    }

    .btn-download {
      background: linear-gradient(135deg, #f59e0b, #dc2626);
      border: none;
      padding: 1.2rem 3rem;
      border-radius: 4rem;
      font-weight: 800;
      font-size: 1.7rem;
      color: #0f0f12;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      box-shadow: 0 0 45px #f97316, 0 15px 30px rgba(0,0,0,0.8);
      transition: all 0.3s;
      border: 1px solid #ffd966;
      position: relative;
      overflow: hidden;
      width: 100%;
      max-width: 320px;
      justify-content: center;
      margin-bottom: 1rem;
      z-index: 5;
    }

    .btn-download:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 0 65px #fbbf24, 0 20px 35px black;
    }

    .btn-download:disabled {
      opacity: 0.7;
      filter: grayscale(0.3);
      cursor: not-allowed;
      box-shadow: 0 0 20px #6b7280;
    }

    .download-animation {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      margin-top: 1rem;
      font-size: 1.3rem;
      color: #fcd34d;
      font-weight: 700;
      background: rgba(0,0,0,0.4);
      padding: 0.7rem 2rem;
      border-radius: 3rem;
      backdrop-filter: blur(12px);
      transition: 0.3s;
    }

    .spinner {
      animation: spin 0.9s linear infinite;
      font-size: 1.5rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .no-ads-tag {
      background: #1e1e2f;
      color: #facc15;
      padding: 0.3rem 1.2rem;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-left: 0.8rem;
      border: 1px solid #fbbf24;
    }

    @media (max-width: 500px) {
      .glass-card {
        padding: 2rem 1.3rem;
      }
      .mod-title {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <div class="premium-badge">
      <i class="fas fa-crown"></i> PREMIUM MOD <i class="fas fa-crown"></i>
    </div>
    <h1 class="mod-title">WB LAND TOOLS</h1>
    <div class="sub-glow">
      <i class="fas fa-shield-haltered"></i> MOD APK v2.2.3 <span class="no-ads-tag"><i class="fas fa-ban"></i> NO ADS</span>
    </div>

    <!-- Feature chips: only Unlocked Pro & Unlimited Tools -->
    <div class="feature-grid">
      <div class="feature-chip"><i class="fas fa-unlock-alt"></i> Unlocked Pro</div>
      <div class="feature-chip"><i class="fas fa-infinity"></i> Unlimited Tools</div>
    </div>

    <!-- AUTO CAPTCHA SECTION -->
    <div class="captcha-section">
      <div class="captcha-header">
        <span><i class="fas fa-robot"></i> HUMAN VERIFICATION</span>
        <span class="auto-captcha-badge"><i class="fas fa-magic"></i> AUTO CAPTCHA</span>
      </div>
      <div class="captcha-display">
        <span class="captcha-code" id="captchaText">X7G2P</span>
      </div>
      <div class="auto-fill-animation" id="autoFillStatus">
        <i class="fas fa-sync-alt spinner" id="syncIcon"></i> 
        <span id="statusMessage">Auto-solving captcha...</span>
      </div>
      <div class="progress-captcha">
        <div class="progress-fill" id="captchaProgressFill"></div>
      </div>
      <div style="display: flex; justify-content: center; color: #cbd5e1; font-size: 0.9rem;">
        <i class="far fa-clock"></i> <span id="timerDisplay" style="margin-left: 0.4rem;">~3s</span>
      </div>
    </div>

    <!-- DOWNLOAD BUTTON & ANIMATION -->
    <div class="download-area">
      <button id="downloadButton" class="btn-download" disabled>
        <i class="fas fa-download"></i> DOWNLOAD <i class="fas fa-download"></i>
      </button>
      <div class="download-animation" id="downloadAnimation" style="display: none;">
        <i class="fas fa-file-zipper"></i> 
        <span id="animationText">Preparing download...</span>
        <i class="fas fa-spinner spinner"></i>
      </div>
    </div>
    <div style="text-align: center; margin-top: 0.8rem; color: #9ca3af; font-size: 0.8rem;">
      <i class="fas fa-lock-open"></i> No ads • Direct APK • Banglarbhumi Mod
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ---- REAL DOWNLOAD LINK (GitHub) ----
      const REAL_DOWNLOAD_URL = "https://github.com/c-10-sketch/BhumiToolPro/releases/download/download/base.apk";
      const captchaTextEl = document.getElementById('captchaText');
      const downloadBtn = document.getElementById('downloadButton');
      const progressFill = document.getElementById('captchaProgressFill');
      const statusMessage = document.getElementById('statusMessage');
      const syncIcon = document.getElementById('syncIcon');
      const timerDisplay = document.getElementById('timerDisplay');
      const downloadAnimationDiv = document.getElementById('downloadAnimation');
      const animationText = document.getElementById('animationText');

      let captchaSolved = false;
      let downloadStarted = false;
      let progressInterval = null;
      let countdownInterval = null;
      
      let currentCaptcha = "X7G2P";

      function generateRandomCaptcha() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ123456789';
        let code = '';
        for (let i = 0; i < 5; i++) {
          code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return code;
      }

      function setCaptchaText(code) {
        captchaTextEl.textContent = code;
      }

      function resetCaptchaSystem() {
        if (progressInterval) clearInterval(progressInterval);
        if (countdownInterval) clearInterval(countdownInterval);
        
        captchaSolved = false;
        downloadStarted = false;
        
        currentCaptcha = generateRandomCaptcha();
        setCaptchaText(currentCaptcha);
        
        progressFill.style.width = '0%';
        statusMessage.textContent = 'Auto-solving captcha...';
        syncIcon.className = 'fas fa-sync-alt spinner';
        timerDisplay.textContent = '~3s';
        downloadBtn.disabled = true;
        
        downloadAnimationDiv.style.display = 'none';
        
        startAutoCaptcha();
      }

      function startAutoCaptcha() {
        let progress = 0;
        const totalDuration = 2800;
        const stepTime = 70;
        const increment = 100 / (totalDuration / stepTime);
        
        statusMessage.textContent = 'Auto-solving captcha...';
        syncIcon.className = 'fas fa-sync-alt spinner';
        
        progressInterval = setInterval(() => {
          progress += increment;
          if (progress >= 100) {
            progress = 100;
            clearInterval(progressInterval);
            progressInterval = null;
            onCaptchaSolved();
          }
          progressFill.style.width = `${Math.min(progress, 100)}%`;
        }, stepTime);
        
        let timeLeft = 3;
        timerDisplay.textContent = `~${timeLeft}s`;
        countdownInterval = setInterval(() => {
          timeLeft -= 1;
          if (timeLeft >= 0) {
            timerDisplay.textContent = `~${timeLeft}s`;
          } else {
            timerDisplay.textContent = `0s`;
          }
          if (timeLeft <= 0) {
            clearInterval(countdownInterval);
            countdownInterval = null;
            timerDisplay.textContent = '0s';
          }
        }, 1000);
      }

      function onCaptchaSolved() {
        if (captchaSolved) return;
        captchaSolved = true;
        
        if (progressInterval) {
          clearInterval(progressInterval);
          progressInterval = null;
        }
        if (countdownInterval) {
          clearInterval(countdownInterval);
          countdownInterval = null;
        }
        
        progressFill.style.width = '100%';
        statusMessage.innerHTML = '<i class="fas fa-check-circle" style="color: #4ade80;"></i> Captcha verified!';
        syncIcon.className = 'fas fa-check-circle';
        syncIcon.style.animation = 'none';
        timerDisplay.textContent = '✓';
        
        downloadBtn.disabled = false;
        downloadBtn.style.boxShadow = '0 0 55px #fbbf24, 0 0 25px #f59e0b';
      }

      function initiateDownload() {
        if (!captchaSolved || downloadStarted) return;
        downloadStarted = true;
        downloadAnimationDiv.style.display = 'flex';
        animationText.textContent = 'Starting download...';
        downloadBtn.disabled = true;
        downloadBtn.style.opacity = '0.8';
        
        const messages = [
          'Unpacking assets...',
          'Verifying APK signature...',
          'Applying mod patch...',
          'Download started! 🚀'
        ];
        let step = 0;
        
        const animInterval = setInterval(() => {
          if (step < messages.length) {
            animationText.textContent = messages[step];
            step++;
          } else {
            clearInterval(animInterval);
            animationText.innerHTML = '<i class="fas fa-check-circle"></i> Downloading now...';
            
     
            setTimeout(() => {
              triggerDirectDownload();
            }, 400);
          }
        }, 700);
      }

      function triggerDirectDownload() {

        window.location.href = REAL_DOWNLOAD_URL;
        

        if (downloadAnimationDiv) {
          animationText.innerHTML = '<i class="fas fa-spinner spinner"></i> Downloading... (check browser)';
        }

        setTimeout(() => {
          downloadStarted = false;
          downloadBtn.disabled = false;
          downloadBtn.style.opacity = '1';
          downloadAnimationDiv.style.display = 'none';
          resetCaptchaSystem();
        }, 6000);
      }

      downloadBtn.addEventListener('click', () => {
        if (!captchaSolved || downloadStarted) return;
        initiateDownload();
      });
      captchaTextEl.addEventListener('dblclick', function(e) {
        resetCaptchaSystem();
      });


      (function initialSetup() {
        currentCaptcha = generateRandomCaptcha();
        setCaptchaText(currentCaptcha);
        resetCaptchaSystem();
      })();

      window.addEventListener('beforeunload', () => {
        if (progressInterval) clearInterval(progressInterval);
        if (countdownInterval) clearInterval(countdownInterval);
      });
    })();
  </script>
</body>
</html>
